<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mingbuloq IM | NetGlobal Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Trumbowyg/2.26.0/ui/trumbowyg.min.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Trumbowyg/2.26.0/trumbowyg.min.js"></script>

    <style>
        :root {
            --primary: #0078d4;
            --bg-mica: #f3f3f3;
            --bg-card: rgba(255, 255, 255, 0.9);
            --text: #1c1c1c;
            --border: rgba(0, 0, 0, 0.1);
            --glass: blur(15px) saturate(150%);
            --shadow: 0 8px 30px rgba(0,0,0,0.12);
        }

        [data-theme="dark"] {
            --bg-mica: #202020;
            --bg-card: rgba(45, 45, 45, 0.9);
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-mica); color: var(--text); transition: 0.3s; }
        .container { width: 90%; max-width: 1200px; margin: auto; }

        /* --- NAVBAR --- */
        .navbar {
            position: sticky; top: 10px; z-index: 1000;
            backdrop-filter: var(--glass); background: var(--bg-card);
            border: 1px solid var(--border); border-radius: 12px;
            padding: 12px 20px; margin: 10px auto; width: 95%; box-shadow: var(--shadow);
            display: flex; justify-content: space-between; align-items: center;
        }
        
        .logo-section { display: flex; align-items: center; gap: 15px; }
        .school-logos { display: flex; align-items: center; }
        .circle-logo {
            width: 40px; height: 40px; border-radius: 50%;
            border: 2px solid var(--primary); object-fit: cover;
            background: white; margin-right: -10px; box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        .main-logo { font-size: 1.2rem; font-weight: 700; text-decoration: none; color: var(--text); margin-left: 15px; }
        .main-logo span { color: var(--primary); }

        .nav-right { display: flex; gap: 10px; }
        .nav-btn {
            background: transparent; border: none; color: var(--text);
            width: 40px; height: 40px; border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
        }
        .nav-btn:hover { background: rgba(0,0,0,0.05); }

        /* --- HERO --- */
        .hero { padding: 60px 0; text-align: center; }
        .hero h1 { font-size: 3rem; font-weight: 700; margin-bottom: 10px; }
        .hero p { opacity: 0.7; margin-bottom: 30px; }

        .btn {
            padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer;
            text-decoration: none; display: inline-flex; align-items: center; gap: 8px; border: none;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--bg-card); border: 1px solid var(--border); color: var(--text); }

        /* --- CARDS --- */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 20px; }

        /* --- MODALS --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center;
            backdrop-filter: blur(10px);
        }
        .modal-content {
            background: var(--bg-card); padding: 30px; border-radius: 16px;
            width: 90%; max-width: 800px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow);
        }

        .input-win { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: rgba(0,0,0,0.02); color: var(--text); margin-bottom: 15px; }
        
        /* Wikipedia Editor Style */
        .trumbowyg-box { border-radius: 8px; margin-bottom: 15px; }
        
        .admin-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
        .tab-btn { padding: 10px; background: none; border: none; color: var(--text); cursor: pointer; opacity: 0.5; }
        .tab-btn.active { opacity: 1; border-bottom: 2px solid var(--primary); font-weight: bold; }

        .map-container { height: 200px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border); }
        
        footer { padding: 40px 0; text-align: center; border-top: 1px solid var(--border); margin-top: 50px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo-section">
            <div class="school-logos">
                <img src="https://i.ibb.co/vz6W7M2/netglobal-logo.png" class="circle-logo" alt="L1">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSqYF7lOa6xR5mG7p5Zp9zQ" class="circle-logo" alt="L2" style="margin-left: -15px;">
            </div>
            <a href="#" class="main-logo">Mingbuloq<span>IM</span></a>
        </div>
        <div class="nav-right">
            <button onclick="toggleTheme()" class="nav-btn"><i class="fas fa-circle-half-stroke"></i></button>
            <button onclick="openLogin()" class="nav-btn"><i class="fas fa-user-gear"></i></button>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1>Aqlli <span>Ijara</span> Portali</h1>
            <p>Ixtisoslashtirilgan maktablar uchun maxsus platforma.</p>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <a href="#main-grid" class="btn btn-primary">E'lonlar</a>
                <a href="#" class="btn btn-secondary">Biz haqimizda</a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="card-grid" id="main-grid">
            </div>
    </main>

    <div id="login-modal" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <h3>Admin Kirish</h3><br>
            <input type="text" id="adm-u" class="input-win" placeholder="Login">
            <input type="password" id="adm-p" class="input-win" placeholder="Parol">
            <button onclick="handleLogin()" class="btn btn-primary" style="width:100%">Kirish</button>
            <button onclick="closeModals()" class="btn btn-secondary" style="width:100%; margin-top:10px;">Yopish</button>
        </div>
    </div>

    <div id="admin-panel" class="modal">
        <div class="modal-content">
            <div class="admin-tabs">
                <button onclick="showTab('add')" id="btn-add" class="tab-btn active">E'lon Qo'shish</button>
                <button onclick="showTab('style')" id="btn-style" class="tab-btn">Dizayn</button>
                <button onclick="showTab('sec')" id="btn-sec" class="tab-btn">Xavfsizlik</button>
            </div>

            <div id="tab-add">
                <input type="text" id="p-title" class="input-win" placeholder="Sarlavha">
                <textarea id="p-desc"></textarea> <div id="map-picker" class="map-container"></div>
                <input type="file" id="p-img" style="margin-bottom: 20px;">
                <button onclick="saveData()" class="btn btn-primary" style="width:100%">Saqlash</button>
            </div>

            <div id="tab-style" style="display:none;">
                <label>Fon rangi:</label> <input type="color" onchange="document.body.style.backgroundColor = this.value"><br><br>
                <label>Shrift o'lchami:</label>
                <select class="input-win" onchange="document.body.style.fontSize = this.value">
                    <option value="14px">Kichik</option>
                    <option value="16px" selected>Normal</option>
                    <option value="18px">Katta</option>
                </select>
            </div>

            <div id="tab-sec" style="display:none;">
                <input type="text" id="new-u" class="input-win" placeholder="Yangi login">
                <input type="password" id="new-p" class="input-win" placeholder="Yangi parol">
                <button onclick="updateAdmin()" class="btn btn-primary">Yangilash</button>
            </div>

            <button onclick="closeModals()" class="btn btn-secondary" style="margin-top:20px;">Yopish</button>
        </div>
    </div>

    <footer>
        <p>© 2026 NetGlobal Team: Solijon, Ulug'bek, Dilmurod</p>
    </footer>

    <script>
        // FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSy...", // O'zingiznikini qo'ying
            authDomain: "mingbulak-ijara.firebaseapp.com",
            projectId: "mingbulak-ijara",
            storageBucket: "mingbulak-ijara.appspot.com",
            messagingSenderId: "999036185534",
            appId: "1:999036185534:web:112a51eb1dcf76c685a7ef"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let adminData = JSON.parse(localStorage.getItem('adm')) || {u: "mystra", p: "mystra2014"};

        // EDITOR (Wikipedia style)
        $('#p-desc').trumbowyg();

        // FUNCTIONS
        function toggleTheme() {
            const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', t);
        }

        function openLogin() { document.getElementById('login-modal').style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }

        function handleLogin() {
            const u = document.getElementById('adm-u').value;
            const p = document.getElementById('adm-p').value;
            if(u === adminData.u && p === adminData.p) {
                document.getElementById('login-modal').style.display='none';
                document.getElementById('admin-panel').style.display='flex';
                initMap();
            } else alert("Xato!");
        }

        function showTab(name) {
            document.getElementById('tab-add').style.display = name === 'add' ? 'block' : 'none';
            document.getElementById('tab-style').style.display = name === 'style' ? 'block' : 'none';
            document.getElementById('tab-sec').style.display = name === 'sec' ? 'block' : 'none';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + name).classList.add('active');
        }

        function updateAdmin() {
            const u = document.getElementById('new-u').value;
            const p = document.getElementById('new-p').value;
            if(u && p) {
                adminData = {u, p};
                localStorage.setItem('adm', JSON.stringify(adminData));
                alert("Yangilandi!");
            }
        }

        let map, marker;
        function initMap() {
            if(map) return;
            map = L.map('map-picker').setView([40.93, 71.33], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            map.on('click', e => {
                if(marker) marker.setLatLng(e.latlng);
                else marker = L.marker(e.latlng).addTo(map);
            });
        }

        async function saveData() {
            const t = document.getElementById('p-title').value;
            const d = $('#p-desc').trumbowyg('html');
            const img = document.getElementById('p-img').files[0];
            let b64 = "";
            if(img) {
                b64 = await new Promise(r => {
                    const reader = new FileReader();
                    reader.onload = e => r(e.target.result);
                    reader.readAsDataURL(img);
                });
            }
            await db.collection("posts").add({ title: t, desc: d, image: b64, time: new Date() });
            alert("Saqlandi!");
            location.reload();
        }

        function render() {
            db.collection("posts").orderBy("time", "desc").onSnapshot(snap => {
                const grid = document.getElementById('main-grid');
                grid.innerHTML = "";
                snap.forEach(doc => {
                    const data = doc.data();
                    grid.innerHTML += `
                        <div class="card">
                            <img src="${data.image || 'https://via.placeholder.com/400'}" class="card-img">
                            <div class="card-body">
                                <h3>${data.title}</h3>
                                <div style="margin-top:10px">${data.desc}</div>
                            </div>
                        </div>`;
                });
            });
        }
        window.onload = render;
    </script>
</body>
</html>
