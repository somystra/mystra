<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mingbulak IM | Ijaralar</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="background-animation"></div>

    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo">Mingbulak<span>IM</span></div>
            <button id="admin-btn" class="nav-icon"><i class="fas fa-user-shield"></i></button>
        </div>
    </nav>

    <header class="hero">
        <div class="container hero-inner" data-aos="zoom-out-up">
            <h1>Ixtisoslashtirilgan maktab uchun <br><span>Shinam Ijaralar</span></h1>
            <p>Xavfsiz va qulay uylarni bir zumda toping.</p>
            <div class="hero-btns">
                <a href="#announcements" class="btn-primary">Uylarni ko'rish</a>
                <a href="https://t.me/mingbulak_im_bot" target="_blank" class="btn-secondary">Ijaraga berish</a>
            </div>
        </div>
    </header>

    <main class="container">
        <section id="announcements">
            <div class="section-header" data-aos="fade-right">
                <h2>Mavjud Ijaralar</h2>
                <div class="line"></div>
            </div>
            <div class="card-grid" id="main-grid"></div>
        </section>
    </main>

    <div id="login-modal" class="modal">
        <div class="modal-content glass">
            <h3>Admin Tizimi</h3>
            <input type="text" id="login" placeholder="Login">
            <input type="password" id="password" placeholder="Parol">
            <button onclick="checkAdmin()" class="btn-primary w-100">Kirish</button>
            <button onclick="closeModal()" class="btn-link">Yopish</button>
        </div>
    </div>

    <div id="admin-panel" class="modal">
        <div class="modal-content glass admin-box">
            <h3 id="form-title">Yangi e'lon qo'shish</h3>
            <input type="hidden" id="edit-id">
            <input type="text" id="post-title" placeholder="Sarlavha">
            <textarea id="post-desc" placeholder="Tavsif..." rows="3"></textarea>
            <input type="text" id="post-map" placeholder="Xarita linki">
            <input type="file" id="post-image" accept="image/*">
            <button onclick="savePost()" class="btn-primary w-100" id="save-btn">Saqlash</button>
            <hr style="margin: 20px 0; opacity: 0.2;">
            <div id="admin-post-list"></div>
            <button onclick="logout()" class="btn-danger">Chiqish</button>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 1000, once: true });</script>
    <script src="script.js"></script>
</body>
</html>
