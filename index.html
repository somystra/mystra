    <style>
        :root {
            --bg-main: radial-gradient(circle at top right, #1e1b4b, #020617);
            --accent: #6366f1;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-main); background-attachment: fixed; color: var(--text); min-height: 100vh; line-height: 1.6; }
        .container { width: 92%; max-width: 1200px; margin: auto; }

        /* --- NAVBAR --- */
        .navbar {
            position: sticky; top: 15px; z-index: 1000;
            backdrop-filter: blur(20px); background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border); border-radius: 12px;
            padding: 12px 25px; margin: 15px auto; display: flex; justify-content: space-between; align-items: center;
        }
        .logo-box { display: flex; align-items: center; gap: 12px; }
        .circle-img { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--accent); background: white; }
        .nav-title { font-size: 1rem; font-weight: 700; }
        .nav-title span { display: block; font-size: 0.7rem; font-weight: 400; opacity: 0.6; }

        /* --- BUTTONS --- */
        .btn { padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; color: white; }
        .btn-primary { background: var(--accent); }
        .btn-danger { background: var(--danger); padding: 6px 12px; font-size: 0.8rem; }
        .btn-ghost { background: var(--glass); border: 1px solid var(--border); }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* --- GRID --- */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; margin: 40px 0; }
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; position: relative; }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 20px; }
        .card-tools { position: absolute; top: 10px; right: 10px; display: none; } /* Faqat admin ko'radi */
        
        /* --- MODALS --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal-content { background: #0f172a; padding: 30px; border-radius: 20px; width: 90%; max-width: 600px; border: 1px solid var(--border); }
        .input-box { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: white; margin-bottom: 15px; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
        .tab-link { padding: 10px; color: gray; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-link.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: bold; }
