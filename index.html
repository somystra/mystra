<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mingbuloq IM | NetGlobal Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo-wrapper">
                <img src="https://i.ibb.co/vz6W7M2/netglobal-logo.png" alt="Logo" class="circle-logo">
                <div class="logo">Mingbuloq<span>IM</span></div>
            </div>
            <div class="nav-right">
                <button id="theme-toggle" class="nav-icon"><i class="fas fa-moon"></i></button>
                <select id="lang-select" class="lang-dropdown">
                    <option value="uz">UZ</option>
                    <option value="en">EN</option>
                    <option value="ru">RU</option>
                </select>
                <button id="search-toggle" class="nav-icon"><i class="fas fa-search"></i></button>
                <button id="admin-btn" class="nav-icon"><i class="fas fa-user-gear"></i></button>
            </div>
        </div>
    </nav>

    <div id="search-bar" class="search-bar-container container">
        <input type="text" id="search-input" placeholder="Qidiruv...">
    </div>

    <header class="hero">
        <div class="hero-bg-shapes"><div class="shape s1"></div><div class="shape s2"></div></div>
        <div class="container hero-inner" data-aos="zoom-out">
            <h1 id="hero-title">Maktabingizga Yaqin <br><span>Aqlli Ijaralar</span></h1>
            <p id="hero-subtitle">NetGlobal Team tomonidan yaratilgan innovatsion platforma.</p>
            <div class="hero-actions">
                <a href="#announcements" class="btn-primary" id="view-btn">E'lonlarni ko'rish</a>
                <a href="https://t.me/mingbulak_im_bot" target="_blank" class="btn-secondary" id="post-btn">
                    <i class="fab fa-telegram"></i> E'lon berish
                </a>
            </div>
        </div>
    </header>

    <main class="container">
        <section id="announcements">
            <div class="section-header">
                <h2 id="section-title">Barcha E'lonlar</h2>
                <div class="gradient-line"></div>
            </div>
            <div class="card-grid" id="main-grid"></div>
        </section>
    </main>

    <div id="ai-chat-wrapper" class="ai-chat-hidden glass-card">
        <div class="ai-chat-header">
            <span><i class="fas fa-robot"></i> NetGlobal AI</span>
            <button id="ai-chat-close"><i class="fas fa-times"></i></button>
        </div>
        <div id="ai-chat-body" class="ai-chat-body"></div>
        <div class="ai-chat-input-area">
            <input type="text" id="ai-user-input" placeholder="Xabar...">
            <button id="ai-send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    <button id="ai-chat-toggle" class="ai-toggle-btn"><i class="fas fa-comment-dots"></i></button>

    <div id="login-modal" class="modal">
        <div class="modal-content glass-card">
            <h3 id="admin-login-text">Admin Kirish</h3>
            <input type="text" id="login" placeholder="Login">
            <input type="password" id="password" placeholder="Parol">
            <button onclick="checkAdmin()" class="btn-primary w-100">Kirish</button>
            <button onclick="closeModal()" class="btn-link">Yopish</button>
        </div>
    </div>

    <div id="admin-panel" class="modal">
        <div class="modal-content glass-card admin-box">
            <div class="admin-tabs">
                <button onclick="showTab('add-post')" class="tab-btn active" id="tab-btn-post">E'lon</button>
                <button onclick="showTab('settings')" class="tab-btn" id="tab-btn-style">Dizayn</button>
                <button onclick="showTab('security')" class="tab-btn" id="tab-btn-sec">Xavfsizlik</button>
            </div>

            <div id="tab-add-post" class="tab-content">
                <input type="text" id="post-title" placeholder="Sarlavha">
                <textarea id="post-desc" placeholder="Tavsif (Bu yerga batafsil ma'lumot yozing...)" rows="10"></textarea>
                <div id="map-picker" class="map-container"></div>
                <input type="hidden" id="selected-coords">
                <input type="file" id="post-image" accept="image/*">
                <button onclick="savePost()" class="btn-primary w-100" id="save-btn">Saqlash</button>
            </div>

            <div id="tab-settings" class="tab-content" style="display:none;">
                <label>Orqa fon rangi:</label>
                <input type="color" id="bg-color-picker" onchange="changeBg(this.value)">
                <label>Shrift o'lchami:</label>
                <select id="font-size-select" onchange="changeFontSize(this.value)">
                    <option value="14px">Kichik</option>
                    <option value="16px" selected>O'rtacha</option>
                    <option value="18px">Katta</option>
                </select>
                <label>Stiker o'lchami:</label>
                <input type="range" min="15" max="50" value="24" onchange="changeIconSize(this.value)">
            </div>

            <div id="tab-security" class="tab-content" style="display:none;">
                <input type="text" id="new-admin-user" placeholder="Yangi Login">
                <input type="password" id="new-admin-pass" placeholder="Yangi Parol">
                <button onclick="updateSecurity()" class="btn-primary w-100">Yangilash</button>
            </div>

            <div style="margin-top:20px; display:flex; gap:10px;">
                <button onclick="logout()" class="btn-danger w-100">Chiqish</button>
                <button onclick="closeModal()" class="btn-secondary w-100">Yopish</button>
            </div>
        </div>
    </div>

    <footer>
        <div class="container footer-content">
            <img src="<a href="https://ibb.co/7dPPdQQR"><img src="https://i.ibb.co/gLNNLddP/Net-Global-jpg.jpg" alt="Net-Global-jpg" border="0"></a>">
            <p>© 2026 Mingbuloq IM</p>
            <div class="creators">
                <p id="creator-label">Yaratuvchilar:</p>
                <div class="names-row">
                    <span>Solijon Muhammadkarimov</span>
                    <span>Ulug'bek Shuxratullayev</span>
                    <span>Dilmurod Abduvaxobov</span>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 800 });</script>
    <script src="script.js"></script>
</body>
</html>
